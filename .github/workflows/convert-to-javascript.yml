name: Convert to JavaScript

on:
  workflow_call:
    inputs:
      source-branch:
        required: true
        type: string
        description: "The TypeScript branch to convert from (e.g. main, main-cli)"
      target-branch:
        required: true
        type: string
        description: "The JavaScript branch to target (e.g. javascript, javascript-cli)"

jobs:
  convert-ts-files:
    runs-on: ubuntu-latest
    env:
      TARGET_BRANCH: ${{ inputs.target-branch }}
      WORK_BRANCH: ${{ inputs.target-branch }}_updates
      TEMP_BRANCH: temp_${{ inputs.target-branch }}_updates
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v5.0.0
        with:
          ref: ${{ inputs.source-branch }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20.x

      - name: Install dependencies
        run: |
          pnpm install
          pnpm add -D @shopify/eslint-plugin

      - name: Create temporary tsconfig file for transpilation
        run: |
          echo '{
            "include": ["./app/**/*", "*.ts", "*.tsx", "env.d.ts", ".graphqlrc.ts"],
            "compilerOptions": {
              "lib": ["DOM", "DOM.Iterable", "ES2022"],
              "strict": true,
              "skipLibCheck": true,
              "isolatedModules": true,
              "allowSyntheticDefaultImports": true,
              "removeComments": false,
              "forceConsistentCasingInFileNames": true,
              "noEmitOnError": true,
              "allowJs": true,
              "resolveJsonModule": true,
              "jsx": "preserve",
              "module": "ES2022",
              "moduleResolution": "bundler",
              "target": "ES2022",
              "baseUrl": ".",
              "types": ["@react-router/node", "vite/client", "@shopify/polaris-types"]
            }
          }' > tsconfig.js.json

      - name: Transpile to Javascript
        run: pnpm tsc -p tsconfig.js.json

      - name: Remove Typescript files
        run: |
          find app \( -name "*.ts" -o -name "*.tsx" \) -delete
          find . \( -name ".graphqlrc.ts" -o -name "tsconfig.js.json" -o -name "vite.config.ts" -o -name "env.d.ts" \) -delete

      - name: Run prettier
        run: pnpm prettier -w "app/**/*.{js,jsx}" ".graphqlrc.js" "vite.config.js"

      - name: Run ESLint
        run: |
          pnpm eslint "app/**/*.{js,jsx}" ".graphqlrc.js" "vite.config.js" --fix --no-cache --ignore-pattern "\!.graphqlrc.js" --plugin @shopify/eslint-plugin --rule '{
            "import/order": "error",
            "import/newline-after-import": "error",
            "padding-line-between-statements": ["error",
              { "blankLine": "always", "prev": ["const", "let", "var"], "next": "*"},
              { "blankLine": "any",    "prev": ["const", "let", "var"], "next": ["const", "let", "var"]},
              { "blankLine": "always", "prev": "*", "next": "return" },
              { "blankLine": "always", "prev": "*", "next": "export" },
              { "blankLine": "never",  "prev": "export", "next": "export" },
              { "blankLine": "always", "prev": "*", "next": "block-like" },
              { "blankLine": "always", "prev": "block-like", "next": "*" }
            ]}'

      - name: Prepare files for git
        run: |
          git config user.name GitHub
          git config user.email noreply@github.com
          git fetch
          git restore --staged package.json
          git restore package.json

      - name: Stage changes to files
        run: |
          git add .
          git checkout -b $TEMP_BRANCH
          git commit -m "Convert template to Javascript"
          git checkout $TARGET_BRANCH || git checkout -b $TARGET_BRANCH
          git pull origin $TARGET_BRANCH || echo "No remote $TARGET_BRANCH branch yet"
          git checkout -
          git rebase -m -X theirs $TARGET_BRANCH
          git push -f origin $TEMP_BRANCH:$WORK_BRANCH

      - name: Create Javascript PR
        run: |
          MERGED_AT=$(gh pr view $WORK_BRANCH --json mergedAt -q ".mergedAt" 2>/dev/null || echo "NO_PR")
          if [ -z "$MERGED_AT" ]; then
            echo "Open unmerged PR already exists, skipping"
          else
            gh pr create -B $TARGET_BRANCH -H $WORK_BRANCH \
              --title "[$TARGET_BRANCH] Convert template to Javascript" \
              --body "This is an automated PR that converts the latest changes from Typescript to Javascript on the \`$TARGET_BRANCH\` branch."
          fi
        env:
          GH_TOKEN: ${{ github.token }}
